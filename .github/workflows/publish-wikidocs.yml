name: Publish WikiDocs

on:
  push:
    branches:
      - main
    paths:
      - "wikidocs/**"
      - ".github/workflows/publish-wikidocs.yml"
  workflow_dispatch:

concurrency:
  group: publish-wikidocs
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 1

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: HyunjunJeon/claude-code-book-wikidocs
          token: ${{ secrets.WIKIDOCS_PUBLISH_PAT }}
          path: target
          fetch-depth: 0

      - name: Mirror wikidocs/ into target root
        run: |
          rsync -a --delete --exclude='.git' source/wikidocs/ target/

      - name: Detect changes
        id: changes
        working-directory: target
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to publish."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git status --short
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: target
        env:
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          short_sha="${SOURCE_SHA:0:7}"
          msg="Sync from ${SOURCE_REPO} @ ${short_sha}"
          printf '%s\n\nSource commit: %s/%s/commit/%s\nWorkflow run: %s\n' \
            "$msg" \
            "$GITHUB_SERVER_URL" "$SOURCE_REPO" "$SOURCE_SHA" \
            "$SOURCE_RUN_URL" > /tmp/commit_msg.txt
          git commit -F /tmp/commit_msg.txt
          git push origin main
